# TaskFlow — full stack in Docker.
#   docker compose up --build      → http://localhost:8080
# The client (nginx) serves the SPA and reverse-proxies /api to the server.
services:
  server:
    build: ./server
    image: taskflow-server
    environment:
      PORT: "4000"
      NODE_ENV: production
      # Override in a root .env file or your shell for anything non-local.
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-long-random-string}"
      JWT_EXPIRES_IN: "604800"
      DATABASE_FILE: "./data/taskflow.db"
      CORS_ORIGIN: "*"
      SEED_DEMO_NAME: "Алекс Морозов"
      SEED_DEMO_EMAIL: "demo@taskflow.app"
      SEED_DEMO_PASSWORD: "demo1234"
    volumes:
      - taskflow-data:/app/data
    # Exposed for direct API access/debugging; the client talks to it internally.
    ports:
      - "4000:4000"
    restart: unless-stopped

  client:
    build: ./client
    image: taskflow-client
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  taskflow-data:
