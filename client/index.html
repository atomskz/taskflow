<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow — личный таск-менеджер с авторизацией, дашбордом и календарём" />
    <title>TaskFlow — личный таск-менеджер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply the cached theme before paint to avoid a light flash in dark mode. -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('taskflow.settings.v1') || 'null');
        document.documentElement.dataset.theme = s && s.theme === 'dark' ? 'dark' : 'light';
      } catch (e) {
        /* default light */
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
