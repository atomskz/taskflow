# Serves the built SPA and reverse-proxies /api to the backend container.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Forward API calls to the backend service ("server" is the compose service name).
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: any unknown path serves index.html so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed static assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
